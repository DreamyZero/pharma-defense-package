<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f2ff"/>
      <stop offset="45%" stop-color="#f4f8ff"/>
      <stop offset="100%" stop-color="#dceafe"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f8ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f4f8ff" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(280 180) rotate(18) scale(520 380)">
      <stop stop-color="#93c5fd" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1580 820) rotate(-12) scale(600 420)">
      <stop stop-color="#5eead4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 120) rotate(35) scale(440 300)">
      <stop stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#3b82f6" fill-opacity="0.08"/>
    </pattern>
    <pattern id="hex" width="120" height="104" patternUnits="userSpaceOnUse" patternTransform="scale(1.2)">
      <path d="M60 8 L104 34 V70 L60 96 L16 70 V34 Z" stroke="#2563eb" stroke-opacity="0.06" stroke-width="1.2" fill="none"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <rect width="1920" height="1080" fill="url(#hex)"/>

  <g opacity="0.07" fill="#1d4ed8">
    <rect x="140" y="720" width="180" height="56" rx="28" transform="rotate(-18 230 748)"/>
    <rect x="1520" y="160" width="220" height="64" rx="32" transform="rotate(24 1630 192)"/>
    <rect x="860" y="900" width="140" height="44" rx="22" transform="rotate(-8 930 922)"/>
  </g>

  <g stroke="#2563eb" stroke-opacity="0.1" stroke-width="2">
    <line x1="420" y1="280" x2="520" y2="340"/>
    <line x1="520" y1="340" x2="610" y2="290"/>
    <line x1="520" y1="340" x2="500" y2="430"/>
    <circle cx="420" cy="280" r="10" fill="#3b82f6" fill-opacity="0.12"/>
    <circle cx="520" cy="340" r="12" fill="#0d9488" fill-opacity="0.14"/>
    <circle cx="610" cy="290" r="9" fill="#7c3aed" fill-opacity="0.12"/>
    <circle cx="500" cy="430" r="8" fill="#2563eb" fill-opacity="0.1"/>
  </g>

  <g stroke="#2563eb" stroke-opacity="0.08" stroke-width="2">
    <line x1="1320" y1="540" x2="1410" y2="500"/>
    <line x1="1410" y1="500" x2="1500" y2="560"/>
    <line x1="1410" y1="500" x2="1390" y2="590"/>
    <circle cx="1320" cy="540" r="9" fill="#0284c7" fill-opacity="0.12"/>
    <circle cx="1410" cy="500" r="11" fill="#3b82f6" fill-opacity="0.12"/>
    <circle cx="1500" cy="560" r="8" fill="#0d9488" fill-opacity="0.1"/>
    <circle cx="1390" cy="590" r="7" fill="#7c3aed" fill-opacity="0.1"/>
