version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pharma
      POSTGRES_USER: pharma
      POSTGRES_PASSWORD: pharma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/password12345
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend-nest:/app
    command: sh -c "rm -rf dist/src && npm install && npx nest start --watch"
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://pharma:pharma@postgres:5432/pharma?schema=public
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password12345
      JWT_SECRET: supersecret
    depends_on:
      - postgres
      - neo4j

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend-react:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  neo4jdata: